server:
  port: 8084

spring:
  application:
    name: alert-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/alert_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

user:
  service:
    base-url: ${USER_SERVICE_URL:http://localhost:8083}

notification:
  service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}

messaging:
  exchange:
    listings: listing.events
  queues:
    alert-listing: alert.listing.queue
  routing-keys:
    listing-new: listing.new

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
