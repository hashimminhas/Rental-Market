server:
  port: 8087

spring:
  application:
    name: listing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/listing_mgmt_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

user:
  service:
    base-url: ${USER_SERVICE_URL:http://localhost:8083}

scraper:
  service:
    base-url: ${SCRAPER_SERVICE_URL:http://localhost:8081}

landlord:
  service:
    base-url: ${LANDLORD_SERVICE_URL:http://localhost:8086}

messaging:
  exchange:
    listings: listing.events
  routing-keys:
    listing-claimed: listing.claimed

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
