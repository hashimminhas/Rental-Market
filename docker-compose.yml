version: "3.9"

services:

  # ── Infrastructure ───────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: uuriturg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uuriturg-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: uuriturg-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ── API Gateway ──────────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: uuriturg-api-gateway
    ports:
      - "8080:8080"
    environment:
      SCRAPER_SERVICE_URL: http://scraper-service:8081
      ANALYTICS_SERVICE_URL: http://analytics-service:8082
      USER_SERVICE_URL: http://user-service:8083
      ALERT_SERVICE_URL: http://alert-service:8084
      NEIGHBORHOOD_SERVICE_URL: http://neighborhood-service:8085
      LANDLORD_SERVICE_URL: http://landlord-service:8086
      LISTING_SERVICE_URL: http://listing-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Microservices ────────────────────────────────────────────────

  scraper-service:
    build: ./scraper-service
    container_name: uuriturg-scraper-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: uuriturg-analytics-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SCRAPER_SERVICE_URL: http://scraper-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: uuriturg-user-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  alert-service:
    build: ./alert-service
    container_name: uuriturg-alert-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      USER_SERVICE_URL: http://user-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      SCRAPER_SERVICE_URL: http://scraper-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  neighborhood-service:
    build: ./neighborhood-service
    container_name: uuriturg-neighborhood-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      ANALYTICS_SERVICE_URL: http://analytics-service:8082
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  landlord-service:
    build: ./landlord-service
    container_name: uuriturg-landlord-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  listing-service:
    build: ./listing-service
    container_name: uuriturg-listing-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SCRAPER_SERVICE_URL: http://scraper-service:8081
      LANDLORD_SERVICE_URL: http://landlord-service:8086
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: uuriturg-notification-service
    ports:
      - "8088:8088"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: uuriturg-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
