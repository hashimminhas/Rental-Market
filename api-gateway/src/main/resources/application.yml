server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ── Global CORS + dedup headers ──────────────────────────────
      default-filters:
        - RemoveResponseHeader=Access-Control-Allow-Origin
        - RemoveResponseHeader=Access-Control-Allow-Credentials
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://uuriturg.cs.ut.ee"
              - "http://uuriturg.cs.ut.ee"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      # ── Routes ───────────────────────────────────────────────────
      # IMPORTANT: More specific paths must come BEFORE less specific ones.
      # /api/listings/managed/** must be declared before /api/listings/**
      routes:

        # Scraper Service (port 8081) — raw scraped listing data
        - id: scraper-service-listings
          uri: ${SCRAPER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/listings/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: scraperServiceCB
                fallbackUri: forward:/fallback

        # Scraper Service (port 8081) — scrape job control
        - id: scraper-service-control
          uri: ${SCRAPER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/scraper/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: scraperServiceCB
                fallbackUri: forward:/fallback

        # Analytics Service (port 8082)
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: analyticsServiceCB
                fallbackUri: forward:/fallback

        # Alert Service (port 8084)
        - id: alert-service
          uri: ${ALERT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/alerts/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: alertServiceCB
                fallbackUri: forward:/fallback

        # Notification Service (port 8088)
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback

        # ── Health check routes — proxy /api/health/{svc} → each service's /actuator/health
        - id: health-scraper
          uri: ${SCRAPER_SERVICE_URL:http://localhost:8081}
          predicates: [ Path=/api/health/scraper ]
          filters: [ SetPath=/actuator/health ]

        - id: health-analytics
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8082}
          predicates: [ Path=/api/health/analytics ]
          filters: [ SetPath=/actuator/health ]

        - id: health-alert
          uri: ${ALERT_SERVICE_URL:http://localhost:8084}
          predicates: [ Path=/api/health/alert ]
          filters: [ SetPath=/actuator/health ]

        - id: health-notification
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates: [ Path=/api/health/notification ]
          filters: [ SetPath=/actuator/health ]

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted

# ── Resilience4j circuit-breaker ─────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      scraperServiceCB:
        base-config: default
      analyticsServiceCB:
        base-config: default
      alertServiceCB:
        base-config: default
      notificationServiceCB:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: WARN
