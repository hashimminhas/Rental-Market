server:
  port: 8088

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/notification_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: smtp.gmail.com
    port: 587
    username: hminhas377@gmail.com
    password: vnkzjizsfyabpugh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

user:
  service:
    base-url: ${USER_SERVICE_URL:http://localhost:8083}

messaging:
  exchange:
    listings: listing.events
    landlord: landlord.events
  queues:
    notification-listing: notification.listing.queue
    notification-landlord: notification.landlord.queue
  routing-keys:
    listing-claimed: listing.claimed
    review-posted: review.posted

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
